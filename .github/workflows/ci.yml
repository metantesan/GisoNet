name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  APP_NAME: Gisonet
  BIN_NAME: gisonet
  CARGO_BIN_NAME: gisonet-ui
  MACOSX_DEPLOYMENT_TARGET: "11.0"

permissions:
  contents: write
  actions: write

jobs:
  macos-pkg:
    name: macOS universal pkg
    runs-on: macos-15
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' ui/Cargo.toml | head -n1)"
          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read gisonet-ui version from ui/Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${cargo_version}" ]]; then
              echo "Tag version ${tag_version} does not match gisonet-ui Cargo version ${cargo_version}" >&2
              exit 1
            fi
          fi

          echo "VERSION=${cargo_version}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build universal binary
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --release --package gisonet-ui --target aarch64-apple-darwin
          cargo build --release --package gisonet-ui --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            -output target/universal-apple-darwin/release/${BIN_NAME} \
            target/aarch64-apple-darwin/release/${CARGO_BIN_NAME} \
            target/x86_64-apple-darwin/release/${CARGO_BIN_NAME}
          strip target/universal-apple-darwin/release/${BIN_NAME}

      - name: Build app bundle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build/pkgroot
          mkdir -p build/pkgroot/Applications
          cp -R "dist/${APP_NAME}.app" "build/pkgroot/Applications/${APP_NAME}.app"
          install -m 755 \
            "target/universal-apple-darwin/release/${BIN_NAME}" \
            "build/pkgroot/Applications/${APP_NAME}.app/Contents/MacOS/${BIN_NAME}"

          mkdir -p build/icon.iconset
          sips -z 16 16 assets/icon.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 assets/icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 assets/icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset \
            -o "build/pkgroot/Applications/${APP_NAME}.app/Contents/Resources/AppIcon.icns"

          plutil -replace CFBundleVersion -string "${VERSION}" \
            "build/pkgroot/Applications/${APP_NAME}.app/Contents/Info.plist"
          plutil -replace CFBundleShortVersionString -string "${VERSION}" \
            "build/pkgroot/Applications/${APP_NAME}.app/Contents/Info.plist"
          chmod -R go-w "build/pkgroot/Applications/${APP_NAME}.app"

      - name: Build pkg
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          pkgbuild \
            --root build/pkgroot \
            --identifier com.metantesan.gisonet \
            --version "${VERSION}" \
            --install-location / \
            "dist/gisonet-${VERSION}-universal-apple-darwin.pkg"

      - name: Upload macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dist/*.pkg

  linux-tar:
    name: Linux tarball
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' ui/Cargo.toml | head -n1)"
          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read gisonet-ui version from ui/Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${cargo_version}" ]]; then
              echo "Tag version ${tag_version} does not match gisonet-ui Cargo version ${cargo_version}" >&2
              exit 1
            fi
          fi

          echo "VERSION=${cargo_version}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release --package gisonet-ui

      - name: Build tarball
        shell: bash
        run: |
          set -euxo pipefail
          pkgdir="gisonet-${VERSION}-x86_64-unknown-linux-gnu"
          rm -rf "build/${pkgdir}"
          install -Dm755 "target/release/${CARGO_BIN_NAME}" "build/${pkgdir}/usr/bin/${BIN_NAME}"
          install -Dm644 assets/icon.png "build/${pkgdir}/usr/share/icons/hicolor/1024x1024/apps/gisonet.png"
          install -Dm644 dist/arch/gisonet.desktop "build/${pkgdir}/usr/share/applications/gisonet.desktop"
          install -Dm644 dist/arch/gisonet.service "build/${pkgdir}/usr/lib/systemd/system/gisonet.service"
          mkdir -p dist
          tar -C build -cJf "dist/${pkgdir}.tar.xz" "${pkgdir}"

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: dist/*.tar.xz

  debian-deb:
    name: Debian package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' ui/Cargo.toml | head -n1)"
          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read gisonet-ui version from ui/Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${cargo_version}" ]]; then
              echo "Tag version ${tag_version} does not match gisonet-ui Cargo version ${cargo_version}" >&2
              exit 1
            fi
          fi

          echo "VERSION=${cargo_version}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build Debian package
        shell: bash
        run: |
          set -euxo pipefail
          cargo bundle -f deb -r -p gisonet-ui
          deb_path="$(find target -type f -name '*.deb' -not -path '*/deps/*' | head -n1)"
          mkdir -p dist
          cp "${deb_path}" "dist/gisonet-${VERSION}.deb"

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: debian-deb
          path: dist/*.deb

  archlinux-pkg:
    name: Arch Linux package
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git rust cargo gtk3 sudo hicolor-icon-theme

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' ui/Cargo.toml | head -n1)"
          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read gisonet-ui version from ui/Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${cargo_version}" ]]; then
              echo "Tag version ${tag_version} does not match gisonet-ui Cargo version ${cargo_version}" >&2
              exit 1
            fi
          fi

          echo "VERSION=${cargo_version}" >> "${GITHUB_ENV}"

      - name: Build source archive
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p build/src
          git archive --format=tar.gz --prefix="gisonet-${VERSION}/" \
            -o "build/src/gisonet-${VERSION}.tar.gz" HEAD

      - name: Build package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p build/arch
          cp dist/arch/PKGBUILD build/arch/PKGBUILD
          cp "build/src/gisonet-${VERSION}.tar.gz" "build/arch/gisonet-${VERSION}.tar.gz"
          cd build/arch
          sed -i \
            -e "s/^pkgver=.*/pkgver=${VERSION}/" \
            -e "s#^source=.*#source=(\"gisonet-${VERSION}.tar.gz\")#" \
            -e "s/^sha256sums=.*/sha256sums=('SKIP')/" \
            PKGBUILD
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          sudo -u builder makepkg --noconfirm
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp ./*.pkg.tar.* "$GITHUB_WORKSPACE/dist/"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-pkg
          path: dist/*.pkg.tar.*

  publish:
    name: Publish release
    needs:
      - macos-pkg
      - linux-tar
      - debian-deb
      - archlinux-pkg
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Delete uploaded workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifactNames = new Set(["macos-pkg", "linux-tar", "debian-deb", "archlinux-pkg"]);
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            for (const artifact of artifacts) {
              if (!artifactNames.has(artifact.name)) {
                continue;
              }

              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
